
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>World Settings (Teacher)</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <link rel="stylesheet" href="layout.css">
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>
  <!-- Dein firebase.initializeApp(...) hier einfügen -->
  <script src="functions.js"></script>
</head>
<style>
/* ===============================
   WORLD PAGE LAYOUT
   =============================== */

html, body {
  height: auto;
  min-height: 100vh;
  margin: 0;
  overflow-y: auto;
}

body {
  background:
    radial-gradient(circle at top left, rgba(34, 197, 94, 0.12), transparent 34rem),
    linear-gradient(135deg, #f6faf7 0%, #edf4f0 52%, #f8fbfa 100%);
  color: #14231a;
}

.page-wrap {
  display: flex;
  flex-direction: column;
  gap: 18px;
  height: auto;
  padding: 22px;
  padding-top: 96px;
  padding-bottom: 40px;
  box-sizing: border-box;
  max-width: 1480px;
  margin: 0 auto;
}

.row-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 18px;
  align-items: start;
  padding:0px;
}

.settings-stack {
  display: flex;
  flex-direction: column;
  gap: 18px;
}

.world-parameters-grid {
  display: grid;
  grid-template-columns: minmax(220px, 1fr) minmax(220px, 1fr) minmax(260px, 1fr);
  gap: 16px;
  align-items: stretch;
}

.parameter-column {
  display: flex;
  flex-direction: column;
  gap: 12px;
  min-width: 0;
}

.parameter-column:not(fieldset) {
  padding: 14px;
  border: 1px solid rgba(20, 35, 26, 0.1);
  border-radius: 12px;
  background: rgba(247, 251, 248, 0.74);
}

/* ===============================
   PANELS
   =============================== */

.panel {
  display: flex;
  flex-direction: column;
  gap: 14px;
  padding: 18px;
  background: rgba(255,255,255,0.88);
  border: 1px solid rgba(20, 35, 26, 0.1);
  border-radius: 14px;
  box-shadow: 0 18px 45px rgba(20, 35, 26, 0.08);
  height: auto;
  max-height: none;
  overflow: visible;
}

.panel h2 {
  text-align: left;
  font-size: 18px;
  line-height: 1.2;
  margin: 0;
  color: #102317;
}

/* ===============================
   HEADER
   =============================== */

#main-header {
  height: 56px;
  padding: 0 22px;
  background: rgba(255,255,255,0.88);
  border-bottom: 1px solid rgba(20, 35, 26, 0.1);
  box-shadow: 0 14px 40px rgba(20, 35, 26, 0.08);
  backdrop-filter: blur(16px);
  position: fixed;
  display: flex;
  justify-content: space-between;
  align-items: center;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
}

.header-left,
.header-right {
  display: flex;
  align-items: center;
  gap: 12px;
}

.app-title {
  font-size: 18px;
  font-weight: 800;
  color: #348451;
  letter-spacing: 0;
  text-transform: capitalize;
}

.logo-image {
  height: 44px;
  width: auto;
  filter: drop-shadow(0 8px 14px rgba(20, 35, 26, 0.12));
}

/* ===============================
   CONTROLS
   =============================== */

.field,
.field label {
  display: flex;
  flex-direction: column;
  gap: 6px;
}

.field {
  margin: 0;
}

.field span,
.field legend {
  color: #486153;
  font-size: 12px;
  font-weight: 800;
}

fieldset.field {
  padding: 14px;
  border: 1px solid rgba(20, 35, 26, 0.1);
  border-radius: 12px;
  background: rgba(247, 251, 248, 0.74);
}

fieldset.field legend {
  padding: 0 6px;
}

input,
select {
  width: 100%;
  min-height: 36px;
  padding: 8px 10px;
  color: #17251c;
  background: #ffffff;
  border: 1px solid rgba(20, 35, 26, 0.16);
  border-radius: 9px;
  outline: none;
  transition: border-color 140ms ease, box-shadow 140ms ease, background 140ms ease;
}

input:focus,
select:focus {
  border-color: #22a860;
  box-shadow: 0 0 0 3px rgba(34, 168, 96, 0.16);
}

.btn {
  border: 1px solid rgba(20, 35, 26, 0.14);
  background: #eef8f1;
  color: #16351f;
  border-radius: 10px;
  flex-shrink: 0;
  transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
}

.btn:hover {
  background: #e3f5e8;
  box-shadow: 0 8px 18px rgba(20, 35, 26, 0.08);
  transform: translateY(-1px);
}

.btn.primary {
  background: #1f9d59;
  border-color: #1f9d59;
  color: #ffffff;
}

.btn.primary:hover {
  background: #18884c;
}

.btn.danger {
  background: #fff1f2;
  border-color: #fecdd3;
  color: #be123c;
}

.btn.danger:hover {
  background: #ffe4e6;
}

.theme-button {
  min-width: 42px;
  height: 38px;
  padding: 0 12px;
}

.header-pill {
  min-width: 220px;
  padding: 7px 34px 7px 14px;
  background-color: #e8f7ee;
  border: 1px solid rgba(31, 157, 89, 0.22);
  border-radius: 8px;
  color: #177345;
  font-size: 13px;
  font-weight: 800;
}

/* ===============================
   TABLES
   =============================== */

.table {
  display: block;
  width: 100%;
  overflow: auto;
  border-collapse: collapse;
  border: 1px solid rgba(20, 35, 26, 0.1);
  border-radius: 12px;
  background: rgba(255,255,255,0.72);
}

#students-table {
  max-height: 65vh;
}

.table thead,
.table tbody {
  display: table;
  width: 100%;
  table-layout: fixed;
}

.table th,
.table td {
  padding: 10px 12px;
  text-align: left;
  box-sizing: border-box;
  border-bottom: 1px solid rgba(20, 35, 26, 0.08);
  vertical-align: middle;
}

.table th {
  position: sticky;
  top: 0;
  z-index: 1;
  background: #eef6f0;
  color: #526357;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0;
  text-transform: uppercase;
}

.table tbody tr {
  transition: background 140ms ease;
}

.table tbody tr:hover {
  background: rgba(34, 197, 94, 0.06);
}

.table tbody tr:last-child td {
  border-bottom: 0;
}

.danger-cell {
  text-align: right;
}

.danger-cell-div {
  width: 100%;
  display: flex;
  justify-content: flex-end;
}

/* ===============================
   CHIPS
   =============================== */

#objects-enabled,
#marketing-enabled {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: 8px;
  max-height: 65vh;
  overflow-y: auto;
  padding-right: 4px;
}

.chip {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
  min-height: 38px;
  padding: 8px 10px;
  color: #263f2e;
  background: rgba(247, 251, 248, 0.82);
  border: 1px solid rgba(20, 35, 26, 0.1);
  border-radius: 10px;
  font-size: 13px;
  font-weight: 700;
  white-space: nowrap;
  cursor: pointer;
}

.chip-main {
  display: flex;
  align-items: center;
  gap: 9px;
  min-width: 0;
}

.chip-name {
  overflow: hidden;
  text-overflow: ellipsis;
}

.chip-icon {
  width: 32px;
  height: 32px;
  flex: 0 0 32px;
  display: flex;
  align-items: center;
  justify-content: center;
}

.chip-icon img {
  max-width: 30px;
  max-height: 30px;
  object-fit: contain;
}

.chip-icon.is-empty {
  border: 1px dashed rgba(20, 35, 26, 0.18);
  border-radius: 8px;
}

.chip:hover {
  background: #e8f7ee;
  border-color: rgba(31, 157, 89, 0.25);
}

.chip input[type="checkbox"] {
  width: 16px;
  height: 16px;
  min-height: 16px;
  flex: 0 0 16px;
  padding: 0;
  accent-color: #1f9d59;
}

/* ===============================
   CREDIT ROWS
   =============================== */

#ws-credit-rows,
.credit-row {
  display: grid;
  gap: 10px;
}

.credit-row {
  grid-template-columns: 1fr 1fr;
}

/* ===============================
   FOOTER BAR
   =============================== */

.footer-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 56px;
  padding: 0 16px;
  display: flex;
  align-items: center;
  gap: 12px;
  background: rgba(255, 255, 255, 0);
  border-top: 1px solid rgba(20, 35, 26, 0.1);
  box-shadow: 0 -14px 40px rgba(20, 35, 26, 0.08);
  z-index: 10;
}

.status {
  color: #486153;
  font-weight: 600;
}

/* ===============================
   DARK MODE
   =============================== */

body.theme-dark {
  --dark-bg: #07111f;
  --dark-bg-deep: #030712;
  --dark-surface-soft: #13223a;
  --dark-surface-raised: #172842;
  --dark-border: rgba(148, 163, 184, 0.22);
  --dark-border-soft: rgba(148, 163, 184, 0.14);
  --dark-text: #e8f1ff;
  --dark-muted: #93a4bd;
  --dark-accent: #38bdf8;
  --dark-accent-strong: #2563eb;
  background:
    radial-gradient(circle at 12% -8%, rgba(56, 189, 248, 0.18), transparent 28rem),
    radial-gradient(circle at 92% 4%, rgba(37, 99, 235, 0.16), transparent 26rem),
    linear-gradient(135deg, var(--dark-bg-deep) 0%, var(--dark-bg) 48%, #09172a 100%);
  color: var(--dark-text);
}

body.theme-dark .panel,
body.theme-dark .footer-bar {
  background: rgba(15, 27, 46, 0);
}

body.theme-dark .panel h2,
body.theme-dark .app-title {
  color: var(--dark-text);
}

body.theme-dark .field span,
body.theme-dark .field legend,
body.theme-dark .status {
  color: var(--dark-muted);
}

body.theme-dark #main-header {
  background: rgba(10, 20, 36, 0.9);
  border-color: var(--dark-border-soft);
  box-shadow: 0 16px 44px rgba(0, 0, 0, 0.3);
}

body.theme-dark .header-pill {
  background-color: rgba(56, 189, 248, 0.13);
  border-color: rgba(56, 189, 248, 0.34);
  color: #93dafe;
}

body.theme-dark input,
body.theme-dark select {
  background: rgba(5, 12, 24, 0.82);
  border-color: rgba(148, 163, 184, 0.22);
  color: var(--dark-text);
}

body.theme-dark input:focus,
body.theme-dark select:focus {
  border-color: var(--dark-accent);
  box-shadow: 0 0 0 3px rgba(56, 189, 248, 0.16);
}

body.theme-dark fieldset.field,
body.theme-dark .parameter-column:not(fieldset),
body.theme-dark .chip {
  background: rgba(7, 17, 31, 0.7);
  border-color: var(--dark-border-soft);
  color: var(--dark-text);
}

body.theme-dark .chip-icon.is-empty {
  border-color: rgba(148, 163, 184, 0.22);
}

body.theme-dark .chip:hover {
  background: rgba(56, 189, 248, 0.1);
  border-color: rgba(56, 189, 248, 0.3);
}

body.theme-dark .table {
  color: var(--dark-text);
  background: rgba(7, 17, 31, 0.7);
  border-color: var(--dark-border-soft);
}

body.theme-dark .table th {
  background: #13213a;
  color: #9fb5d3;
}

body.theme-dark .table td {
  border-color: rgba(148, 163, 184, 0.1);
}

body.theme-dark .table tbody tr:hover {
  background: rgba(56, 189, 248, 0.08);
}

body.theme-dark .btn {
  background: var(--dark-surface-soft);
  border-color: var(--dark-border);
  color: #dbeafe;
}

body.theme-dark .btn:hover {
  background: var(--dark-surface-raised);
  box-shadow: 0 10px 24px rgba(0, 0, 0, 0.24);
}

body.theme-dark .btn.primary {
  background: linear-gradient(135deg, var(--dark-accent-strong), #0284c7);
  border-color: rgba(125, 211, 252, 0.4);
  color: #f8fbff;
}

body.theme-dark .btn.danger {
  background: rgba(127, 29, 29, 0.26);
  border-color: rgba(248, 113, 113, 0.36);
  color: #fecdd3;
}

/* ===============================
   RESPONSIVE
   =============================== */

@media (max-width: 1180px) {
  .world-parameters-grid {
    grid-template-columns: 1fr 1fr;
  }

  .world-parameters-grid .parameter-column:last-child {
    grid-column: 1 / -1;
  }
}

@media (max-width: 900px) {
  .row-grid,
  .world-parameters-grid {
    grid-template-columns: 1fr 1fr;
  }

  .row-grid {
    grid-template-columns: 1fr;
  }

  .world-parameters-grid .parameter-column:last-child {
    grid-column: auto;
  }
}

@media (max-width: 620px) {
  #objects-enabled,
  #marketing-enabled {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 760px) {
  #main-header {
    height: auto;
    min-height: 74px;
    padding: 10px 14px;
    flex-wrap: wrap;
  }

  .header-center {
    order: 3;
    width: 100%;
  }

  .header-pill {
    min-width: 0;
    width: 100%;
  }

  .page-wrap {
    padding: 14px;
    padding-top: 136px;
    padding-bottom: 96px;
  }

  .row-grid,
  .world-parameters-grid,
  .credit-row {
    grid-template-columns: 1fr;
  }

  .panel {
    padding: 14px;
  }
}

@media (max-width: 560px) {
  .app-title {
    display: none;
  }
}
</style>
<body class="theme-light">
  <header id="main-header">
    <div class="header-left">
      <img src="./logo_transparent.png" class="logo-image" alt="Green Bee Logo">
      <span class="app-title">World Settings</span>
    </div>
    <div class="header-right">
      <select id="world-select" class="header-pill"></select>
      <button id="save-world" class="btn primary">Save Settings</button>
      <button id="theme-toggle" class="btn small theme-button" title="Toggle theme">☀︎ / 🌙</button>
    </div>
  </header>

  <main class="page-wrap">
    <div class="settings-stack">
      <section class="panel">
        <h2>World Parameters</h2>
        <div class="world-parameters-grid">
          <div class="parameter-column">
            <label class="field">
              <span>World Name</span>
              <input id="ws-name">
            </label>
            <label class="field">
              <span>Start Budget</span>
              <input id="ws-startBudget" type="number" min="0">
            </label>
            <label class="field">
              <span>Max Turns</span>
              <input id="ws-maxTurns" type="number" min="1">
            </label>
            <label class="field">
              <span>Grid Size (rows = cols)</span>
              <input id="ws-gridSize" type="number" min="3" max="20">
            </label>
          </div>
          <fieldset class="field parameter-column">
            <legend>Population</legend>
            <label><span>Youth</span><input id="ws-population-0" type="number" min="0"></label>
            <label><span>Families</span><input id="ws-population-1" type="number" min="0"></label>
            <label><span>Seniors</span><input id="ws-population-2" type="number" min="0"></label>
          </fieldset>
          <fieldset class="field parameter-column">
            <legend>Credit Options</legend>
            <label>
              <span>Number of options</span>
              <select id="ws-credit-count">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
              </select>
            </label>
            <div id="ws-credit-rows"></div>
          </fieldset>
        </div>
      </section>
      <div class="row-grid">
        <section class="panel">
          <h2>Enabled Objects</h2>
          <div id="objects-enabled" class="chip-list"></div>
        </section>

        <!--
<section class="panel">
  <h2>Enabled Marketing</h2>
  <div id="marketing-enabled" class="chip-list"></div>
</section>
-->
        <section class="panel">
          <h2>Students (Name + Code)</h2>
          <table class="table" id="students-table">
            <thead>
              <tr>
                <th>Player ID</th>
                <th>Display Name</th>
                <th>Code</th>
                <th></th>
              </tr>
            </thead>
            <tbody></tbody>
          </table>
          <button id="add-student" class="btn small">+ Add Student</button>
        </section>
      </div>
    </div>

    <span id="status-world" class="status"></span>
  </main>

  <script>
    let localGlobal = null;
    let currentWorldId = null;
    let currentWorld = null;

    function applyThemeFromStorage() {
      const pref = localStorage.getItem("gb-theme") || "light";
      document.body.classList.toggle("theme-dark", pref === "dark");
    }
    document.getElementById("theme-toggle").addEventListener("click", () => {
      const isDark = document.body.classList.toggle("theme-dark");
      localStorage.setItem("gb-theme", isDark ? "dark" : "light");
    });
    applyThemeFromStorage();

    async function initWorlds() {
      localGlobal = await loadGlobalSettings();
      const worlds = await listWorlds();
      const sel = document.getElementById("world-select");
      sel.innerHTML = "";

      worlds.forEach(w => {
        const opt = document.createElement("option");
        opt.value = w;
        opt.textContent = w;
        sel.appendChild(opt);
      });

      const optNew = document.createElement("option");
      optNew.value = "__new__";
      optNew.textContent = "+ New World…";
      sel.appendChild(optNew);

      sel.addEventListener("change", onWorldChange);

      if (worlds.length > 0) {
        sel.value = worlds[0];
        await loadWorld(worlds[0]);
      } else {
        sel.value = "__new__";
        createNewWorld();
      }
    }

    function createNewWorld() {
      const name = prompt("Name for new world:", "world1") || "world1";
      currentWorldId = name;
    const mktEnabled = {};

Object.keys(localGlobal.marketingChannels || {}).forEach(k => {
  mktEnabled[k] = false; // Default: alles aus
});

currentWorld = {
  name,
  startBudget: 200,
  maxTurns: 12,
  gridSize: 5,
  //tickets: [500, 400, 300],
  population: [2000, 2000, 2000],
  creditoptions: [[100, 5]],
  objectsEnabled: {},
  students: {},
  marketingEnabled: mktEnabled
};

      renderWorldForm();
    }

    async function onWorldChange() {
      const value = this.value;
      if (value === "__new__") {
        createNewWorld();
      } else {
        await loadWorld(value);
      }
    }

    async function loadWorld(worldId) {
      currentWorldId = worldId;
      const ws = await loadWorldSettings(worldId);
      currentWorld = {
        name: ws.name || worldId,
        startBudget: ws.startBudget || 0,
        maxTurns: ws.maxTurns || 10,
        gridSize: ws.gridSize || 5,
        population: Array.isArray(ws.population) ? ws.population : [
          (ws.population && ws.population[0]) || 0,
          (ws.population && ws.population[1]) || 0,
          (ws.population && ws.population[2]) || 0
        ],
        objectsEnabled: ws.objectsEnabled || {},
        students: ws.students || {},
        marketingEnabled: ws.marketingEnabled || {},
        creditoptions: normalizeCreditOptions(ws.creditoptions),

      };

      if (!currentWorld.objectsEnabled) currentWorld.objectsEnabled = {};
      Object.keys(localGlobal.objects || {}).forEach(k => {
        if (typeof currentWorld.objectsEnabled[k] === "undefined") {
          currentWorld.objectsEnabled[k] = true;
        }
      });
      if (!currentWorld.marketingEnabled) currentWorld.marketingEnabled = {};
if (!currentWorld.marketingEnabled) currentWorld.marketingEnabled = {};
Object.keys(localGlobal.marketingChannels || {}).forEach(k => {
  // Default: false, nur echtes true bleibt true
  currentWorld.marketingEnabled[k] = (currentWorld.marketingEnabled[k] === true);
});


      renderWorldForm();
    }

    function normalizeCreditOptions(rawOptions) {
      if (!Array.isArray(rawOptions)) return [[100, 5]];

      const normalized = rawOptions
        .slice(0, 3)
        .map(opt => {
          if (!Array.isArray(opt)) return null;
          const amount = Math.max(0, parseFloat(opt[0]) || 0);
          const interest = Math.max(0, parseFloat(opt[1]) || 0);
          return [amount, interest];
        })
        .filter(Boolean);

      return normalized.length > 0 ? normalized : [[100, 5]];
    }

    function readCreditOptionsFromForm() {
      const rows = Array.from(document.querySelectorAll("#ws-credit-rows .credit-row"));
      return rows.map(row => {
        const amountEl = row.querySelector('input[data-field="amount"]');
        const interestEl = row.querySelector('input[data-field="interest"]');
        const amount = Math.max(0, parseFloat(amountEl && amountEl.value) || 0);
        const interest = Math.max(0, parseFloat(interestEl && interestEl.value) || 0);
        return [amount, interest];
      });
    }

    function renderCreditOptionRows(options) {
      const rowsHost = document.getElementById("ws-credit-rows");
      rowsHost.innerHTML = "";

      options.forEach((opt, idx) => {
        const row = document.createElement("div");
        row.className = "credit-row";
        row.innerHTML = `
          <label><span>Amount ${idx + 1}</span><input data-field="amount" type="number" min="0" value="${opt[0]}"></label>
          <label><span>Interest % ${idx + 1}</span><input data-field="interest" type="number" min="0" step="0.01" value="${opt[1]}"></label>
        `;
        rowsHost.appendChild(row);
      });
    }

    function onCreditCountChange() {
      const countEl = document.getElementById("ws-credit-count");
      const targetCount = Math.min(3, Math.max(1, parseInt(countEl.value, 10) || 1));
      const existing = readCreditOptionsFromForm();
      while (existing.length < targetCount) existing.push([0, 0]);
      renderCreditOptionRows(existing.slice(0, targetCount));
    }

    function getObjectIconPath(key) {
      const objectSettings = localGlobal.objects && localGlobal.objects[key];
      return objectSettings && objectSettings.icon ? objectSettings.icon : "";
    }

    function renderWorldForm() {
      document.getElementById("ws-name").value = currentWorld.name;
      document.getElementById("ws-startBudget").value = currentWorld.startBudget;
      document.getElementById("ws-maxTurns").value = currentWorld.maxTurns;
      document.getElementById("ws-gridSize").value = currentWorld.gridSize;
      document.getElementById("ws-population-0").value = currentWorld.population[0] || 0;
      document.getElementById("ws-population-1").value = currentWorld.population[1] || 0;
      document.getElementById("ws-population-2").value = currentWorld.population[2] || 0;
      const creditOptions = normalizeCreditOptions(currentWorld.creditoptions);
      document.getElementById("ws-credit-count").value = String(creditOptions.length);
      renderCreditOptionRows(creditOptions);

      const objDiv = document.getElementById("objects-enabled");
      objDiv.innerHTML = "";
      Object.keys(localGlobal.objects || {}).forEach(k => {
        const label = document.createElement("label");
        label.className = "chip";
        const main = document.createElement("div");
        main.className = "chip-main";
        const input = document.createElement("input");
        input.type = "checkbox";
        input.dataset.key = k;
        input.checked = !!currentWorld.objectsEnabled[k];
        const span = document.createElement("span");
        span.className = "chip-name";
        span.textContent = k;
        const iconWrap = document.createElement("div");
        iconWrap.className = "chip-icon";
        const iconPath = getObjectIconPath(k);

        main.appendChild(input);
        main.appendChild(span);
        label.appendChild(main);

        if (iconPath) {
          const icon = document.createElement("img");
          icon.src = iconPath;
          icon.alt = "";
          icon.loading = "lazy";
          iconWrap.appendChild(icon);
        } else {
          iconWrap.classList.add("is-empty");
        }

        label.appendChild(iconWrap);
        objDiv.appendChild(label);
      });
const mktDiv = document.getElementById("marketing-enabled");
if(mktDiv){
  mktDiv.innerHTML = "";
}
Object.keys(localGlobal.marketingChannels || {}).forEach(k => {
  const label = document.createElement("label");
  label.className = "chip";

  const input = document.createElement("input");
  input.type = "checkbox";
  input.dataset.key = k;
  input.checked = (currentWorld.marketingEnabled[k] === true);


  const span = document.createElement("span");
  span.textContent = (localGlobal.marketingChannels[k] && localGlobal.marketingChannels[k].label) 
    ? localGlobal.marketingChannels[k].label 
    : k;

  label.appendChild(input);
  label.appendChild(span);
  if(mktDiv){
     mktDiv.appendChild(label);
  }
});

      const tbody = document.querySelector("#students-table tbody");
      tbody.innerHTML = "";
      Object.keys(currentWorld.students || {}).forEach(id => {
        const st = currentWorld.students[id];
        addStudentRow(id, st.name, st.code);
      });
    }

    function addStudentRow(id = "", name = "", code = "") {
      const tbody = document.querySelector("#students-table tbody");
      const tr = document.createElement("tr");
      tr.innerHTML = `
        <td><input data-field="id" value="${id}"></td>
        <td><input data-field="name" value="${name}"></td>
        <td><input data-field="code" value="${code}"></td>
        <td class="danger-cell"><div class="danger-cell-div"><button class="btn small danger" data-action="delete">✕</button></div></td>
      `;
      tbody.appendChild(tr);
    }

    document.getElementById("add-student").addEventListener("click", () => addStudentRow());
    document.getElementById("ws-credit-count").addEventListener("change", onCreditCountChange);

    document.querySelector("#students-table tbody").addEventListener("click", e => {
      if (e.target.dataset.action === "delete") {
        e.target.closest("tr").remove();
      }
    });

    document.getElementById("save-world").addEventListener("click", async () => {
      currentWorld.name = document.getElementById("ws-name").value.trim() || currentWorldId;
      currentWorld.startBudget = parseFloat(document.getElementById("ws-startBudget").value) || 0;
      currentWorld.maxTurns = parseInt(document.getElementById("ws-maxTurns").value, 10) || 1;
      currentWorld.gridSize = parseInt(document.getElementById("ws-gridSize").value, 10) || 5;
      currentWorld.population = [
        parseInt(document.getElementById("ws-population-0").value, 10) || 0,
        parseInt(document.getElementById("ws-population-1").value, 10) || 0,
        parseInt(document.getElementById("ws-population-2").value, 10) || 0
      ];
      currentWorld.creditoptions = readCreditOptionsFromForm();

      const enabled = {};
      document.querySelectorAll("#objects-enabled input[type=checkbox]").forEach(cb => {
        enabled[cb.dataset.key] = cb.checked;
      });
      currentWorld.objectsEnabled = enabled;
const mktEnabled = {};
document.querySelectorAll("#marketing-enabled input[type=checkbox]").forEach(cb => {
  mktEnabled[cb.dataset.key] = cb.checked;
});
currentWorld.marketingEnabled = mktEnabled;

      const students = {};
      document.querySelectorAll("#students-table tbody tr").forEach(tr => {
        const id = tr.querySelector('input[data-field="id"]').value.trim();
        const name = tr.querySelector('input[data-field="name"]').value.trim();
        const code = tr.querySelector('input[data-field="code"]').value.trim();
        if (!id || !name || !code) return;
        students[id] = { name, code };
      });
      currentWorld.students = students;

      try {
        await saveWorldSettings(currentWorldId, currentWorld);
        document.getElementById("status-world").textContent = "Saved";
      } catch (err) {
        console.error(err);
        document.getElementById("status-world").textContent = "Error";
      }
    });

    initWorlds();
  </script>
